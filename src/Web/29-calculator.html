<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>29 - Calculator App</title>
    <link rel="stylesheet" href="common.css" />
    <style>
        .calc {
            width: 320px;
            margin: auto;
            border: 2px solid #1b2c42;
            border-radius: 12px;
            padding: 12px;
            background: #e8f1ff;
        }

        .display {
            width: 100%;
            height: 50px;
            text-align: right;
            font-size: 24px;
            padding: 8px;
            background: #fff;
            border: 1px solid #678;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .pad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .pad button {
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="container">
            <h1>29 - Calculator App</h1>

            <br />
            <br />

            <div class="calc">
                <input id="display" class="display" type="text" readonly />
                <div class="pad" id="pad"></div>
            </div>
            <br />
            <br />
        </div>

        <footer class="footer">
            <h3>&COPY; <a href="https://github.com/WoodenNebula/lab_assignment" target="_blank"
                    title="Source Code">Surab Parajuli</a></h3>
            <ul type="circle">
                <li>'A' - 34</li>
                <li>80010139</li>
            </ul>
        </footer>
    </div>

    <script>
        const keys = ["7", "8", "9", "/", "4", "5", "6", "*", "1", "2", "3", "-", "(", "0", ")", "+", "C", "=", ".", "%"];
        const display = document.getElementById("display");
        const pad = document.getElementById("pad");

        keys.forEach((k) => {
            const btn = document.createElement("button");
            if (parseInt(k) >= 0) {
                btn.style.backgroundColor = "#d1a28d";
            } else if (["+", "-", "*", "/", "%"].includes(k)) {
                btn.style.backgroundColor = "#ffa70a";
            } else if (k === "C") {
                btn.style.backgroundColor = "#8f232d";
            } else if (k === "=") {
                btn.style.backgroundColor = "#2fc31d";
            } else {
                btn.style.backgroundColor = "#25a2ff";
            }
            btn.textContent = k;
            btn.addEventListener("click", () => processKey(k));
            pad.appendChild(btn);
        });

        function processKey(key) {
            if (key === "C") {
                display.value = "";
                return;
            }
            if (key === "=") {
                try {
                    display.value = eval(display.value) || "Error";
                } catch {

                    display.value = "Error";
                }
                return;
            }
            display.value += key;
        }

        document.addEventListener("keydown", (e) => {
            const allowed = "0123456789+-*/.%()";
            if (allowed.includes(e.key)) {
                if (display.value === "Error") processKey("C");
                display.value += e.key;
            } else if (e.key === "Enter") {
                e.preventDefault();
                processKey("=");
            } else if (["Backspace", "Delete"].includes(e.key)) {
                display.value = display.value.slice(0, -1);
            } else if (e.key.toLowerCase() === "c" || e.key == "Escape") {
                processKey("C");
            }
        });
    </script>
</body>

</html>
